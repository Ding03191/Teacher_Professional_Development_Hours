services:
  backend:
    build:
      context: ./backEnd
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/db/scoringHistory.sqlite
    volumes:
      - backend_db:/app/db
      - backend_attachments:/app/attachments

  frontend:
    build:
      context: ./frontEnd
    ports:
      - "5051:80"
    volumes:
      - ./frontEnd/public:/usr/share/nginx/html
      - ./frontEnd/src:/usr/share/nginx/html/src
      - ./frontEnd/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  backend_db:
  backend_attachments:
