services:
  backend:
    build:
      context: ./backEnd
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/db/scoringHistory.sqlite
    volumes:
      - backend_db:/app/db
      - backend_attachments:/app/attachments

  frontend:
    build:
      context: ./frontEnd
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_db:
  backend_attachments:
