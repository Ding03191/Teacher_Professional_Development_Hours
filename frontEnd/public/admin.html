<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css">
  <title>教師帳號登入</title>
  <link rel="stylesheet" href="../src/css/admin.css" />
</head>
<body>
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">◎</span>
        <span id="topbarAccount" class="topbar-account"></span>
        <a id="topbarLoginLink" class="topbar-link" href="admin.html">登入</a>
        <a id="topbarSettingsLink" class="topbar-link is-hidden" href="admin.html">設定</a>
        <button id="btnLogoutTop" class="topbar-link is-hidden" type="button">登出</button>
      </div>
    </header>
    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in.html">校內申請</a>
        <a class="nav-link" href="teacher.html">校外申請</a>
        <a class="nav-link" href="history.html">歷史記錄</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">語言切換</button>
      </div>
    </aside>
    <div class="layout-main">
  <header class="appbar">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>教師帳號登入</h1>
    </div>
    <nav class="appbar-actions is-hidden">
      <a class="btn" href="history.html">History</a>
      <a class="btn" href="teacher.html">教師申請表</a>
      <a class="btn" href="teacher_in.html">校內活動表</a>
      <button id="btnLogout" class="btn ghost is-hidden" type="button">登出</button>
    </nav>
  </header>

  <main class="container">
    <section id="loginPanel" class="auth-shell">
      <div class="auth-card">
        <div class="auth-visual">
          <div class="auth-eyebrow">Teacher Professional Development</div>
          <h2>教師帳號登入</h2>
          <p class="muted">進入後可管理教師帳號與權限，並檢視最新的申請狀態。</p>
          <ul class="auth-points">
            <li>快速查詢與管理</li>
            <li>安全登入與權限控管</li>
            <li>即時掌握最新紀錄</li>
          </ul>
        </div>
        <div class="auth-form">
          <form id="loginForm" class="form">
            <label class="field">
              <span class="lbl">單位（使用者）名稱</span>
              <select id="unitSelect" name="unitName" required>
                <option value="">請選擇單位</option>
              </select>
            </label>
            <label class="field">
              <span class="lbl">帳號</span>
              <input name="account" type="text" placeholder="請輸入帳號" required />
            </label>
            <label class="field">
              <span class="lbl">密碼</span>
              <input name="password" type="password" placeholder="請輸入密碼" required />
            </label>
            <div class="actions">
              <button class="btn primary" type="submit">登入</button></div>
            <div id="loginMsg" class="msg"></div>
          </form>
        </div>
      </div>
    </section>

    <section id="adminPanel" class="is-hidden">
      <div class="section-hd">
        <h2>使用者管理</h2>
        <p id="adminHint" class="muted"></p>
      </div>

      <article class="card">
        <div class="card-hd">新增使用者</div>
        <div class="card-bd">
          <form id="createForm" class="form grid g-2">
            <label class="field">
              <span class="lbl">姓名</span>
              <input name="name" required />
            </label>
            <label class="field">
              <span class="lbl">Email</span>
              <input name="email" type="email" required />
            </label>
            <label class="field">
              <span class="lbl">密碼</span>
              <input name="password" type="password" required />
            </label>
            <label class="field">
              <span class="lbl">角色</span>
              <select name="role">
                <option value="teacher">teacher</option>
                <option value="staff">staff</option>
                <option value="root">root</option>
              </select>
            </label>
            <div class="actions span-2">
              <button class="btn primary" type="submit">新增</button>
              <span id="createMsg" class="msg"></span>
            </div>
          </form>
        </div>
      </article>

      <article class="card">
        <div class="card-hd">使用者列表</div>
        <div class="card-bd">
          <div class="table-wrap">
            <table class="table" id="userTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>姓名</th>
                  <th>Email</th>
                  <th>角色</th>
                  <th>建立時間</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="listMsg" class="msg"></div>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-title">國立勤益科技大學 - 教務處 教學資源組（復通樓2樓）</div>
    <div class="footer-line">辦公時間：週一～週五</div>
    <div class="footer-line">電話：(04) 2392-4505 轉分機 2170</div>
  </footer>

  </div>
  </div>
  <script src="../src/js/admin.js" defer></script>
</body>
</html>
