<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css">
  <title>國立勤益科技大學教師成長時數平台</title>
  <link rel="stylesheet" href="../src/css/admin.css" />
  <style>
    .login-shell {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
      margin: 32px 0 48px;
      padding: 32px 16px 60px;
      background: linear-gradient(135deg, rgba(219, 234, 254, 0.6), rgba(233, 213, 255, 0.5), rgba(252, 231, 243, 0.55));
      border-radius: 22px;
      overflow: hidden;
    }

    .login-blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(42px);
      opacity: 0.55;
      animation: blobFloat 10s ease-in-out infinite;
    }

    .blob-a {
      width: 280px;
      height: 280px;
      background: rgba(96, 165, 250, 0.5);
      top: -60px;
      left: -30px;
    }

    .blob-b {
      width: 360px;
      height: 360px;
      background: rgba(196, 181, 253, 0.55);
      bottom: -120px;
      right: -80px;
      animation-delay: 1.5s;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(12px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-header h2 {
      margin: 12px 0 6px;
      font-size: 28px;
    }

    .login-subtitle {
      margin: 0;
      color: #6b7280;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
    }

    .login-form {
      display: grid;
      gap: 16px;
    }

    .login-field {
      display: grid;
      gap: 6px;
    }

    .input-wrap {
      position: relative;
      display: grid;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      width: 18px;
      height: 18px;
      color: #9ca3af;
    }

    .login-form input[type="text"],
    .login-form input[type="password"] {
      height: 46px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 0 42px 0 40px;
      font-size: 14px;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-form input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .toggle-password .eye-off {
      display: none;
    }

    .toggle-password.is-on .eye-on {
      display: none;
    }

    .toggle-password.is-on .eye-off {
      display: block;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #6b7280;
    }

    .login-submit {
      position: relative;
      height: 48px;
      border: none;
      background: linear-gradient(110deg, #2563eb, #4f46e5, #7c3aed);
      background-size: 180% 180%;
      color: #fff;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.28);
      transition: transform 0.16s ease, box-shadow 0.2s ease, filter 0.2s ease;
      overflow: hidden;
      isolation: isolate;
      animation: loginGlow 4.8s ease-in-out infinite;
    }

    .login-submit::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-120%) skewX(-20deg);
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.22) 40%,
        transparent 75%
      );
      transition: transform 0.55s ease;
      pointer-events: none;
      z-index: -1;
    }

    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.34);
      filter: saturate(1.08);
    }

    .login-submit:hover::after {
      transform: translateX(120%) skewX(-20deg);
    }

    .login-submit:active {
      transform: translateY(0) scale(0.985);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.28);
    }

    .login-submit:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.5), 0 12px 24px rgba(59, 130, 246, 0.28);
    }

    @keyframes loginGlow {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .login-divider {
      position: relative;
      margin: 20px 0 14px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }

    .login-divider::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #e5e7eb;
    }

    .login-divider span {
      position: relative;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.86);
    }

    .google-signin-slot {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      transition: transform 0.16s ease, box-shadow 0.2s ease;
      transform-origin: center;
    }

    .google-signin-slot > div {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .google-signin-slot:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    }

    .google-signin-slot:focus-within {
      transform: scale(0.985);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.14);
    }

    @keyframes blobFloat {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(12px) scale(1.08);
      }
    }
  </style>
</head>
<body class="is-login">
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">◎</span>
        <span id="topbarAccount" class="topbar-account"></span>
        <a id="topbarLoginLink" class="topbar-link" href="admin">登入</a>
        <button id="btnLogoutTop" class="topbar-link is-hidden" type="button">登出</button>
      </div>
    </header>
    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in">校內申請</a>
        <a class="nav-link" href="teacher">校外申請</a>
        <a class="nav-link" href="history">歷史記錄</a>
        <a class="nav-link root-only" data-role="root" href="review">時數審核</a>
        <a class="nav-link root-only" data-role="root" href="user_management">使用者管理</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">語言切換</button>
      </div>
    </aside>
    <div class="layout-main">
  <header class="appbar">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>國立勤益科技大學教師成長時數平台</h1>
    </div>
    <nav class="appbar-actions is-hidden">
      <a class="btn" href="history">History</a>
      <a class="btn" href="teacher">教師申請表</a>
      <a class="btn" href="teacher_in">校內活動表</a>
      <button id="btnLogout" class="btn ghost is-hidden" type="button">登出</button>
    </nav>
  </header>

  <main class="container">
    <section id="loginPanel" class="login-shell">
      <div class="login-blob blob-a" aria-hidden="true"></div>
      <div class="login-blob blob-b" aria-hidden="true"></div>

      <div class="login-card">
        <div class="login-header">
          <h2>國立勤益科技大學教師成長時數平台</h2>
        </div>

        <form id="loginForm" class="login-form">
          <label class="login-field">
            <span class="lbl">帳號</span>
            <span class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.4 0-8 2.24-8 5v1h16v-1c0-2.76-3.6-5-8-5Z"></path>
                </svg>
              </span>
              <input name="account" type="text" placeholder="請輸入帳號" required />
            </span>
          </label>

          <label class="login-field">
            <span class="lbl">密碼</span>
            <span class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path d="M12 2a6 6 0 0 1 6 6v3h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h2V8a6 6 0 0 1 6-6Zm0 2a4 4 0 0 0-4 4v3h8V8a4 4 0 0 0-4-4Z"></path>
                </svg>
              </span>
              <input id="loginPassword" name="password" type="password" placeholder="請輸入密碼" required />
              <button class="toggle-password" type="button" aria-label="顯示密碼" data-toggle="password">
                <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24">
                  <path d="M12 5c5.33 0 9.6 3.05 11 7-1.4 3.95-5.67 7-11 7S2.4 15.95 1 12c1.4-3.95 5.67-7 11-7Zm0 3a4 4 0 1 0 4 4 4 4 0 0 0-4-4Z"></path>
                </svg>
                <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24">
                  <path d="M3 4.27 4.28 3 21 19.72 19.73 21l-3.05-3.05A12.64 12.64 0 0 1 12 19C6.67 19 2.4 15.95 1 12a12.76 12.76 0 0 1 4.18-5.3Zm8.36 8.36a2 2 0 0 1-2.72-2.72ZM12 7a4.98 4.98 0 0 1 4.95 4.3l-2.11-2.11A2.01 2.01 0 0 0 12 9a2 2 0 0 0-.19.84L9.7 7.75A4.96 4.96 0 0 1 12 7Z"></path>
                </svg>
              </button>
            </span>
          </label>

          <label class="remember-row">
            <input type="checkbox" />
            <span>記住我</span>
          </label>

          <button class="btn login-submit" type="submit">登入</button>
          <div id="loginMsg" class="msg"></div>
        </form>

        <div class="login-divider">
          <span>或使用以下方式</span>
        </div>

        <div id="googleSigninContainer" class="google-signin-slot"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="footer-title">國立勤益科技大學 - 教務處 教學資源組（復通樓2樓）</div>
    <div class="footer-line">辦公時間：週一～週五</div>
    <div class="footer-line">電話：(04) 2392-4505 轉分機 2170</div>
  </footer>

  </div>
  </div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../src/js/admin.js" defer></script>
</body>
</html>
