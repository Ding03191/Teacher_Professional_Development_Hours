<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css">
  <title>History Records</title>
  <link rel="stylesheet" href="../src/css/history.css" />
</head>
<body>
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">◎</span>
        <a class="topbar-link" href="admin.html">登入</a>
        <a class="topbar-link" href="admin.html">設定</a>
        <button id="btnLogoutTop" class="topbar-link is-hidden" type="button">登出</button>
      </div>
    </header>
    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in.html">校內申請</a>
        <a class="nav-link" href="teacher.html">校外申請</a>
        <a class="nav-link active" href="history.html">歷史記錄</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">語言切換</button>
      </div>
    </aside>
    <div class="layout-main">
  <header class="appbar">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>History Records</h1>
    </div>
    <nav class="appbar-actions">
      <a class="btn" href="teacher.html">Teacher</a>
      <a class="btn" href="teacher_in.html">In-Campus</a>
      <a class="btn ghost" href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-hd">申請紀錄</div>
      <div class="history-toolbar">
        <div class="tabs" role="tablist">
          <button class="tab is-active" data-type="all" type="button">全部</button>
          <button class="tab" data-type="in" type="button">校內</button>
          <button class="tab" data-type="out" type="button">校外</button>
        </div>
        <div class="actions">
          <button id="btnRefresh" class="btn" type="button">更新</button>
          <span id="historyMsg" class="msg"></span>
        </div>
      </div>

      <div id="historyList" class="history-list"></div>
    </section>

    <div id="printArea" class="print-area is-hidden"></div>
  </main>
  </div>
  </div>
  <script src="../src/js/auth_guard.js" defer></script>
  <script src="../src/js/history.js" defer></script>
</body>
</html>
