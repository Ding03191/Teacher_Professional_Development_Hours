<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css">
  <title>教師帳號註冊</title>
  <link rel="stylesheet" href="../src/css/register.css" />
</head>
<body>
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">◎</span>
        <a class="topbar-link" href="admin.html">登入</a>
        <a class="topbar-link" href="admin.html">設定</a>
      </div>
    </header>
    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in.html">校內申請</a>
        <a class="nav-link" href="teacher.html">校外申請</a>
        <a class="nav-link" href="history.html">歷史記錄</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">語言切換</button>
      </div>
    </aside>
    <div class="layout-main">
  <header class="appbar">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>教師帳號註冊</h1>
    </div>
    <nav class="appbar-actions">
      <a class="btn ghost" href="admin.html">返回登入</a>
    </nav>
  </header>

  <main class="container">
    <section class="register-card">
      <div class="register-visual">
        <div class="register-eyebrow">Welcome</div>
        <h2>建立教師帳號</h2>
        <p class="muted">註冊後即可登入系統，提交與管理研習時數紀錄。</p>
        <div class="register-note">
          <span>提醒：</span>請使用常用 Email，完成後即可登入。
        </div>
      </div>
      <div class="register-form">
        <form id="registerForm" class="form">
          <label class="field">
            <span class="lbl">單位（使用者）名稱</span>
            <input name="unitName" type="text" placeholder="教務處" required />
          </label>
          <label class="field">
            <span class="lbl">帳號</span>
            <input name="account" type="text" placeholder="請輸入帳號" required />
          </label>
          <label class="field">
            <span class="lbl">密碼</span>
            <input name="password" type="password" placeholder="請輸入密碼" required />
          </label>
          <div class="actions">
            <button class="btn primary" type="submit">註冊</button>
            <a class="link" href="admin.html">已有帳號？登入</a>
          </div>
          <div id="registerMsg" class="msg"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-title">國立勤益科技大學 - 教務處 教學資源組（復通樓2樓）</div>
    <div class="footer-line">辦公時間：週一～週五</div>
    <div class="footer-line">電話：(04) 2392-4505 轉分機 2170</div>
  </footer>

  </div>
  </div>
  <script src="../src/js/register.js" defer></script>
</body>
</html>
