<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>教師帳號註冊</title>
  <link rel="stylesheet" href="../src/css/register.css" />
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>教師帳號註冊</h1>
    </div>
    <nav class="appbar-actions">
      <a class="btn ghost" href="admin.html">返回登入</a>
    </nav>
  </header>

  <main class="container">
    <section class="register-card">
      <div class="register-visual">
        <div class="register-eyebrow">Welcome</div>
        <h2>建立教師帳號</h2>
        <p class="muted">註冊後即可登入系統，提交與管理研習時數紀錄。</p>
        <div class="register-note">
          <span>提醒：</span>請使用常用 Email，完成後即可登入。
        </div>
      </div>
      <div class="register-form">
        <form id="registerForm" class="form">
          <label class="field">
            <span class="lbl">單位（使用者）名稱</span>
            <input name="unitName" type="text" placeholder="教務處" required />
          </label>
          <label class="field">
            <span class="lbl">帳號</span>
            <input name="account" type="text" placeholder="請輸入帳號" required />
          </label>
          <label class="field">
            <span class="lbl">密碼</span>
            <input name="password" type="password" placeholder="請輸入密碼" required />
          </label>
          <div class="actions">
            <button class="btn primary" type="submit">註冊</button>
            <a class="link" href="admin.html">已有帳號？登入</a>
          </div>
          <div id="registerMsg" class="msg"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-title">國立勤益科技大學 - 教務處 教學資源組（復通樓2樓）</div>
    <div class="footer-line">辦公時間：週一～週五</div>
    <div class="footer-line">電話：(04) 2392-4505 轉分機 2170</div>
  </footer>

  <script src="../src/js/register.js" defer></script>
</body>
</html>
