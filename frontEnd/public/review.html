<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css">
  <title>時數審核</title>
  <link rel="stylesheet" href="../src/css/review.css?v=20260427-1" />
</head>
<body>
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">管</span>
        <span id="topbarAccount" class="topbar-account"></span>
        <a id="topbarLoginLink" class="topbar-link" href="admin">登入</a>
        <button id="btnLogoutTop" class="topbar-link is-hidden" type="button">登出</button>
      </div>
    </header>
    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in">校內申請</a>
        <a class="nav-link" href="teacher">校外申請</a>
        <a class="nav-link" href="history">歷史紀錄</a>
        <a class="nav-link active root-only" data-role="root" href="review">時數審核</a>
        <a class="nav-link root-only" data-role="root" href="user_management">使用者管理</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">繁體中文</button>
      </div>
    </aside>
    <div class="layout-main">
      <main class="container">
        <section class="card">
          <div class="card-hd">時數審核</div>
          <div class="review-toolbar">
            <div class="tabs" role="tablist">
              <button class="tab is-active" data-status="all" type="button">全部</button>
              <button class="tab" data-status="pending" type="button">待審核</button>
              <button class="tab" data-status="approved" type="button">通過</button>
              <button class="tab" data-status="rejected" type="button">退件</button>
            </div>
            <div class="actions">
              <button id="btnReviewRefresh" class="btn" type="button">重新整理</button>
              <span id="reviewMsg" class="msg"></span>
            </div>
          </div>

          <div id="reviewList" class="review-list"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../src/js/auth_guard.js" defer></script>
  <script src="../src/js/review.js?v=20260427-1" defer></script>
</body>
</html>
