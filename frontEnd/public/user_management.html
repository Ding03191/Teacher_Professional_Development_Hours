<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/css/layout.css" />
  <link rel="stylesheet" href="../src/css/user_management.css" />
  <title>使用者管理</title>
</head>
<body>
  <div class="layout">
    <header class="layout-topbar">
      <div class="layout-title">國立勤益科技大學教師成長時數平台</div>
      <div class="topbar-actions">
        <span class="topbar-user" aria-hidden="true">管</span>
        <span id="topbarAccount" class="topbar-account"></span>
        <a id="topbarLoginLink" class="topbar-link" href="admin">登入</a>
        <button id="btnLogoutTop" class="topbar-link is-hidden" type="button">登出</button>
      </div>
    </header>

    <aside class="layout-sidebar">
      <nav class="sidebar-nav">
        <a class="nav-link" href="teacher_in">校內申請</a>
        <a class="nav-link" href="teacher">校外申請</a>
        <a class="nav-link" href="history">歷史記錄</a>
        <a class="nav-link root-only" data-role="root" href="review">時數審核</a>
        <a class="nav-link active root-only" data-role="root" href="user_management">使用者管理</a>
      </nav>
      <div class="sidebar-footer">
        <button class="lang-btn" type="button">語言切換</button>
      </div>
    </aside>

    <div class="layout-main">
            <main class="container">
        <!-- 頁首與標題 -->
        <div class="page-header" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: 24px; padding: 12px 0;">
          <div>
            <h2 style="font-size: 24px; color: var(--text); margin: 0 0 8px 0; font-weight: 700; display: flex; align-items: center; gap: 8px;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--brand);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              使用者管理
            </h2>
            <p id="adminHint" class="muted" style="margin: 0;"></p>
          </div>
        </div>

        <!-- 新增使用者表單 -->
        <section class="control-panel">
          <div class="control-group">
            <h4 class="group-title">新增使用者</h4>
            <form id="createForm" class="form grid g-2" style="background: rgba(248, 250, 252, 0.5); padding: 24px; border-radius: 12px; border: 1px dashed var(--border);">
              <label class="field">
                <span class="lbl">姓名</span>
                <input name="name" required placeholder="請輸入姓名" />
              </label>
              <label class="field">
                <span class="lbl">Email (帳號)</span>
                <input name="email" type="email" required placeholder="user@example.com" />
              </label>
              <label class="field">
                <span class="lbl">密碼</span>
                <input name="password" type="password" required placeholder="請輸入密碼" />
              </label>
              <label class="field">
                <span class="lbl">角色權限</span>
                <select name="role" class="modern-select">
                  <option value="teacher">teacher (一般教師)</option>
                  <option value="staff">staff (行政人員)</option>
                  <option value="root">root (系統管理員)</option>
                </select>
              </label>
              <div class="actions span-2" style="justify-content: flex-end; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 16px;">
                <span id="createMsg" class="msg" style="margin-right: 16px; align-self: center;"></span>
                <button class="btn primary btn-large" type="submit" style="display: flex; align-items: center; gap: 8px;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                  新增使用者
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- 資料列表與頁籤 -->
        <section class="data-grid-section">
          <div class="review-toolbar" style="margin-bottom: 24px; border-bottom: 1px solid var(--border);">
            <div class="tabs" role="tablist" style="display: flex; gap: 24px; overflow-x: auto;">
              <button class="tab is-active" data-target="users" type="button" style="padding: 12px 4px; font-size: 16px; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s;">一般使用者</button>
              <button class="tab" data-target="depts" type="button" style="padding: 12px 4px; font-size: 16px; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s;">部門帳號</button>
            </div>
          </div>

          <!-- 使用者列表 -->
          <div id="usersView" class="tab-content" style="display: block;">
            <div class="table-wrap">
              <table class="table modern-table" id="userTable">
                <thead>
                  <tr>
                    <th width="60">ID</th>
                    <th width="120">姓名</th>
                    <th width="200">Email</th>
                    <th width="160">角色</th>
                    <th width="180">建立時間</th>
                    <th style="text-align: right;">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div id="listMsg" class="msg" style="margin-top: 12px;"></div>
          </div>

          <!-- 部門列表 -->
          <div id="deptsView" class="tab-content" style="display: none;">
            <div class="table-wrap">
              <table class="table modern-table" id="deptTable">
                <thead>
                  <tr>
                    <th width="60">ID</th>
                    <th width="100">代碼</th>
                    <th width="180">單位名稱</th>
                    <th width="120">帳號</th>
                    <th width="200">新密碼（選填）</th>
                    <th width="180">建立時間</th>
                    <th style="text-align: right;">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div id="deptMsg" class="msg" style="margin-top: 12px;"></div>
          </div>
        </section>

      </main>

    </div>
  </div>

  <script src="../src/js/auth_guard.js" defer></script>
  <script src="../src/js/user_management.js" defer></script>
</body>
</html>
